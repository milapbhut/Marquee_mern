<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        form {
            width: 70%;
            margin: 0 auto;
            padding: 20px;
            border: 2px solid #000000;
            border-radius: 5px;
        }
        label {
            font-weight: bold;
        }
        li {
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000000;
            margin-bottom: 20px;
        }
        th, td {
            border: 2px solid #000000;
            padding: 8px;
            text-align: left;
        }
        input[type="text"], input[type="date"], input[type="email"], input[type="password"], input[type="time"] ,input[type="number"], input[type="file"], textarea {
            width: auto;
            padding: 5px;
            border-left: 1px solid #ffffff;
            border-top: 1px solid #ffffff;
            border-right: 1px solid #ffffff;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body align="center">
    <h1>Sports Physician Form</h1>
    <form action="actionpage.html" method="get">
        <fieldset align="left">
            <legend><h4>Athlete Information</h4></legend>
            <ul>
                <li><label for="name">Name :</label> <input type="text" name="name" id="name"></li>
                <li><label for="school">School/Team:</label> <input type="text" name="school" id="school"></li>
                <li><label for="sport">Sport:</label> <input type="text" name="sport" id="sport" ></li>
                <li><label for="parent_name">Parent/Guardian Name:</label> <input type="text" name="parent_name" id="parent_name" ></li>
                <li><label for="contact_number">Contact Number:</label> <input type="number" name="contact_number" id="contact_number" ></li>
                <li><label for="email">Email:</label> <input type="email" name="email" id="email" ></li>
                <li><label for="password">Password:</label> <input type="password" name="password" id="password"></li>
                <li><label for="address">Address:</label> <textarea name="address" id="address" placeholder="Enter your address here..."></textarea></li>
            </ul>
        </fieldset>
        <fieldset align="left">
            <legend><h4>Medical History</h4></legend>
            <ul>
                <li><label for="concussion_history">History of concussion:</label> <input type="radio" name="concussion_history" id="yes" value="yes" ><label for="yes">Yes</label> <input type="radio" name="concussion_history" id="no" value="no" ><label for="no">No</label></li>
                <li><label for="previous_surgeries">Previous surgeries:</label> <input type="text" name="previous_surgeries" id="previous_surgeries"></li>
                <li><label for="bone_fractures">Any bone fractures? :</label> <input type="radio" name="bone_fractures" id="fractures_yes" value="yes" ><label for="fractures_yes">Yes</label> <input type="radio" name="bone_fractures" id="fractures_no" value="no" ><label for="fractures_no">No</label></li>
                <li><label for="asthma">Asthma or breathing problems:</label> <input type="radio" name="asthma" id="asthma_yes" value="yes" ><label for="asthma_yes">Yes</label> <input type="radio" name="asthma" id="asthma_no" value="no" ><label for="asthma_no">No</label></li>
            </ul>
        </fieldset>
        <fieldset align="left">
            <legend><h4>Fitness Assessment</h4></legend>
            <table>
                <tr>
                    <th>Category</th>
                    <th>Pass</th>
                    <th>Fail</th>
                    <th>Comments</th>
                </tr>
                <tr>
                    <td>Cardiovascular</td>
                    <td><input type="radio" name="cardio" value="pass"></td>
                    <td><input type="radio" name="cardio" value="fail"></td>
                    <td><input type="text" name="cardio_comments"></td>
                </tr>
                <tr>
                    <td>Flexibility</td>
                    <td><input type="radio" name="flexibility" value="pass"></td>
                    <td><input type="radio" name="flexibility" value="fail"></td>
                    <td><input type="text" name="flexibility_comments"></td>
                </tr>
                <tr>
                    <td>Strength</td>
                    <td><input type="radio" name="strength" value="pass"></td>
                    <td><input type="radio" name="strength" value="fail"></td>
                    <td><input type="text" name="strength_comments"></td>
                </tr>
                <tr>
                    <td>Endurance</td>
                    <td><input type="radio" name="endurance" value="pass"></td>
                    <td><input type="radio" name="endurance" value="fail"></td>
                    <td><input type="text" name="endurance_comments"></td>
                </tr>
            </table>
        </fieldset>
        <fieldset align="left">
            <legend><h4>Doctor's Recommendations for Sport Partition</h4></legend>
            <ul>
                <li><label for="Cleared">Cleared for sports:</label> <input type="radio" name="Cleared" id="cleared_yes" value="yes" ><label for="cleared_yes">Yes</label> <input type="radio" name="Cleared" id="cleared_no" value="no" ><label for="cleared_no">No</label></li>
                <li><label for="reasons">If not cleared, provide reasons:</label><input type="text" name="reasons" id="reasons"></li>
                <li><label for="sign">Physician's Signature:</label><input type="text" name="sign" id="sign"><label for="sign">Date:</label><input type="date" name="date" id="date"><label for="time">Time:</label><input type="time" name="time" id="time"></li>
                <li><label for="medical_cert">Medical Certificate:</label><input type="file" name="medical_cert" id="medical_cert" accept=".pdf,.jpg,.jpeg,.png"></li>
            </ul>
        </fieldset><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
