<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .card {
            width: 300px;
            height: 400px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .card-image {
            width: 100%;
            height: 30%;
            background-color: #4772f5;
            border-radius: 10px 10px 0 0;
            position: relative;
        }
        .card-image img {
            margin-left: 30%;
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
        }
        .card-content {
            width: 100%;
            height: 70%;
            background-color: #f5f5f5;
            border-radius: 0 0 10px 10px;
            text-align: center;
        }
        .card-content div{
            margin-top: 20px;
        }
        h3{
            margin-top: 30px;
        }
        button{
            width: 100px;
            height: 30px;
            border-radius: 20px;
            border: none;
            background-color: #4772f5;
            color: #fff;
            margin: 10px;
        }
        i{
            margin: 10px;
        }
        .stats{
            display: inline-block;
            margin: 5px;
            border-left: 1px solid #ccc;
        }
        .social-icons i{
            margin: 5px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-image">
            <img src="profile.png" alt="Profile Image" width="40%" height="100%">
        </div>
        <div class="card-content">
            <div>
                <h3>CodingLab</h3>
                <p>YouTuber & Blogger</p>
            </div>
            <div class="social-icons">
                <i class="fa-brands fa-facebook" style="color: #4772f5;"></i>
                <i class="fa-brands fa-twitter" style="color: #1da1f2;"></i>
                <i class="fa-brands fa-square-instagram" style="color: #fc1287;"></i>
                <i class="fa-brands fa-whatsapp" style="color: #25d366;"></i>
            </div>
            <div>
                <button>Follow</button>
                <button>Message</button>
            </div>
            <div>
                <div class="stats" style="border-left: none;">
                    <i class="fa-regular fa-heart"></i>60.4k
                </div>
                <div class="stats">
                    <i class="fa-regular fa-comment"></i>20k
                </div>
                <div class="stats">
                    <i class="fa-solid fa-share"></i>12.4k
                </div>
            </div>
            </div>
        </div>
    </div>
</body>
</html>
