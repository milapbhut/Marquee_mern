<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    <link rel="stylesheet" href="practice3.css">

<body>
    <div class="demo">

            <div class="eliment" id="active">

            </div>
            <div class="eliment">
                <div class="eliment_icon"><i class="fa-solid fa-server"></i></div>
                <div class="eliment_name">Backend</div>

            <div class="eliment">
                <div class="eliment_icon"><i class="fa-solid fa-mobile-screen-button"></i></div>

                </div>

                    <div class="content_eliment_name">CSS3</div>
                </div>

                    <div class="content_eliment_icon"><i class="fa-brands fa-react" style="color: rgb(0, 0, 0);"></i></div>
